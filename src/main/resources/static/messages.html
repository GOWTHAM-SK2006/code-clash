<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages — CodeClash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        :root {
            --bg-primary: #0A0A0C;
            --accent: #FF6B00;
        }

        body {
            background: radial-gradient(circle at top right, #121217, #0A0A0C);
            background-attachment: fixed;
            overflow-x: hidden;
            font-size: 14px;
        }

        .chat-container {
            height: calc(100vh - 180px);
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 1.5rem;
            backdrop-filter: blur(24px);
            overflow: hidden;
        }

        .chat-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.01);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message-bubble {
            max-width: 80%;
            padding: 1rem;
            border-radius: 1.25rem;
            position: relative;
            animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .message-user {
            align-self: flex-end;
            background: rgba(255, 107, 0, 0.1);
            border: 1px solid rgba(255, 107, 0, 0.2);
            border-bottom-right-radius: 0.25rem;
        }

        .message-admin {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-bottom-left-radius: 0.25rem;
        }

        .chat-input-area {
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 1rem;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 107, 0, 0.2);
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="page-content pt-24 pb-12">
        <div class="container mx-auto px-4 max-w-4xl">
            <div class="chat-container shadow-2xl">
                <div class="chat-header">
                    <div class="flex items-center justify-between">
                        <div>
                            <h1 id="querySubject" class="text-xl font-black text-white tracking-tight">Loading Query...</h1>
                            <p id="queryStatus" class="text-[10px] font-bold text-[#FF6B00] uppercase tracking-widest mt-1">Status: --</p>
                        </div>
                        <a href="profile.html" class="text-[10px] font-black text-gray-500 uppercase tracking-widest hover:text-[#FF6B00] transition-colors flex items-center gap-2">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                            Back to Profile
                        </a>
                    </div>
                </div>

                <div id="chatMessages" class="chat-messages">
                    <!-- Messages will be injected here -->
                    <div class="flex items-center justify-center h-full text-gray-600 italic text-sm">
                        Loading conversation history...
                    </div>
                </div>

                <div id="replyArea" class="chat-input-area">
                    <textarea id="replyInput" placeholder="Type your message here..." rows="1"
                        class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-[#FF6B00] transition-all resize-none"></textarea>
                    <button id="sendReplyBtn"
                        class="bg-[#FF6B00] hover:bg-[#FF8C32] text-black font-black px-6 rounded-xl transition-all active:scale-95 text-[10px] uppercase tracking-widest shadow-lg shadow-[#FF6B00]/10 flex items-center gap-2">
                        <span>Send</span>
                        <div id="sendSpinner" class="hidden w-3 h-3 border-2 border-black/30 border-t-black rounded-full animate-spin"></div>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/messages.js"></script>
</body>

</html>
