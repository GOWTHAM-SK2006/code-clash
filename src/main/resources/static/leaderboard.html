<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard — CodeClash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="page-content">
        <div class="container" style="max-width:900px;">
            <div class="page-header" style="text-align:center; margin-bottom: 3rem;">
                <h1
                    style="font-size: 3rem; font-weight: 900; background: linear-gradient(135deg, #FFF, #FF6B00); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 20px rgba(255,107,0,0.2));">
                    🏆 Leaderboard</h1>
                <p style="font-size: 1.1rem; color: var(--text-secondary); margin-top: 0.5rem; opacity: 0.8;">Top coders
                    ranked by battle performance</p>
            </div>

            <div class="mb-8 max-w-2xl mx-auto flex flex-col md:flex-row gap-4 items-center">
                <div class="relative group flex-1 w-full">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-white/40 group-focus-within:text-[#FF6B00] transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input type="text" id="leaderboardSearch" 
                        placeholder="Search coders by name or ID..." 
                        class="w-full bg-[#1e1e2e]/50 border border-white/10 rounded-xl pl-11 pr-4 py-3 text-sm text-white focus:outline-none focus:border-[#FF6B00] focus:ring-1 focus:ring-[#FF6B00]/20 transition-all placeholder:text-white/20">
                </div>

            </div>

            <div id="leaderboard">
                <div class="spinner"></div>
            </div>
        </div>
    </main>

    <style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0);
            }
        }

        @keyframes glow {
            0% {
                box-shadow: 0 0 5px rgba(255, 107, 0, 0.2);
            }

            50% {
                box-shadow: 0 0 25px rgba(255, 107, 0, 0.5);
            }

            100% {
                box-shadow: 0 0 5px rgba(255, 107, 0, 0.2);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .podium-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 4rem;
            padding: 0 1rem;
        }

        .podium-item {
            flex: 1;
            max-width: 260px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 2rem 1.5rem;
            text-align: center;
            position: relative;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .podium-item.animate-up { animation: fadeInUp 0.6s ease both; }
        .podium-item.animate-right { animation: fadeInRight 0.6s ease both; }
        .podium-item.animate-scale { animation: scaleIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }

        .podium-item.special-glow {
            border-color: rgba(255, 107, 0, 0.4);
            box-shadow: 0 0 40px rgba(255, 107, 0, 0.15);
            background: linear-gradient(180deg, rgba(255, 107, 0, 0.05), rgba(255, 255, 255, 0.02));
        }

        .podium-item:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 107, 0, 0.4);
            background: rgba(255, 255, 255, 0.05);
        }

        .podium-item.first {
            height: 320px;
            border-color: rgba(255, 107, 0, 0.3);
            z-index: 2;
        }

        .podium-item.first.animate-up { animation: fadeInUp 0.6s ease both, float 4s ease-in-out infinite; }
        .podium-item.first.animate-right { animation: fadeInRight 0.6s ease both, float 4s ease-in-out infinite; }
        .podium-item.first.animate-scale { animation: scaleIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both, float 4s ease-in-out infinite; }

        .podium-item.second {
            height: 280px;
            animation-delay: 0.1s;
        }

        .podium-item.third {
            height: 260px;
            animation-delay: 0.2s;
        }

        .rank-badge {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
            margin: -40px auto 1rem;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .first .rank-badge {
            background: linear-gradient(135deg, #FFD700, #B8860B);
            color: #000;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .second .rank-badge {
            background: linear-gradient(135deg, #C0C0C0, #808080);
            color: #000;
        }

        .third .rank-badge {
            background: linear-gradient(135deg, #CD7F32, #8B4513);
            color: #000;
        }

        .score-display {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--accent);
            margin: 0.5rem 0;
            letter-spacing: -1px;
        }

        .podium-stats {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .stat-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.2rem 0.6rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .leaderboard-list {
            display: grid;
            gap: 0.75rem;
        }

        .leaderboard-list.animate-up .leaderboard-card { animation: fadeInUp 0.6s ease both; }
        .leaderboard-list.animate-right .leaderboard-card { animation: fadeInRight 0.6s ease both; }

        .leaderboard-card {
            display: grid;
            grid-template-columns: 80px 1fr auto auto;
            align-items: center;
            padding: 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
        }

        .leaderboard-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.15);
            transform: scale(1.01);
        }

        .card-rank {
            font-weight: 800;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .card-user {
            display: flex;
            flex-direction: column;
        }

        .card-user .name {
            font-weight: 700;
            font-size: 1.05rem;
        }

        .card-user .handle {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .card-stats {
            display: flex;
            gap: 1.5rem;
            margin-right: 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .card-score {
            font-weight: 900;
            font-size: 1.3rem;
            color: var(--accent);
            min-width: 80px;
            text-align: right;
        }

        .filter-btn {
            color: rgba(255, 255, 255, 0.4);
        }

        .filter-btn:hover {
            color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.03);
        }

        .filter-btn.active {
            color: #FF6B00;
            background: rgba(255, 107, 0, 0.1);
            border: 1px solid rgba(255, 107, 0, 0.2);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @media (max-width: 768px) {
            .podium-container {
                flex-direction: column;
                align-items: center;
                gap: 3rem;
            }

            .podium-item {
                width: 100%;
                height: auto !important;
                padding-top: 3rem;
            }

            .podium-item.first {
                order: -1;
            }

            .card-stats {
                display: none;
            }
        }
    </style>


    <div id="userStatsModal" class="modal-overlay">
        <div class="modal-content animate-scale">
            <button class="modal-close" onclick="closeUserStats()">&times;</button>
            <div class="modal-header">
                <h2 id="modalUserName" class="text-2xl font-black"></h2>
                <p id="modalUserHandle" class="text-sm text-white/40"></p>
            </div>
            <div class="modal-body">
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-label">Current Rank</span>
                        <div class="flex items-baseline gap-1">
                            <span class="text-sm text-white/40">#</span>
                            <span id="modalRank" class="stat-value">0</span>
                        </div>
                    </div>
                    <div class="stat-card text-[#FF6B00]">
                        <span class="stat-label">Problems Solved</span>
                        <span id="modalProblemsSolved" class="stat-value">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Battles Played</span>
                        <span id="modalBattlesPlayed" class="stat-value">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Battles Won</span>
                        <span id="modalBattlesWon" class="stat-value">0</span>
                    </div>
                    <div class="stat-card wide">
                        <span class="stat-label">Winning Rate</span>
                        <div class="flex items-center gap-4">
                            <div class="flex-1 h-2 bg-white/5 rounded-full overflow-hidden">
                                <div id="modalWinRateBar" class="h-full bg-gradient-to-r from-[#FF6B00] to-[#FF8E3D] transition-all duration-1000" style="width: 0%"></div>
                            </div>
                            <span id="modalWinPercentage" class="stat-value">0%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1.5rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: #12121e;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(90deg);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .stat-card.wide {
            grid-column: span 2;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 700;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 900;
        }

        /* Update existing styles for interactivity */
        .podium-item, .leaderboard-card {
            cursor: pointer;
        }
    </style>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/leaderboard.js"></script>
    <script>
        function closeUserStats() {
            document.getElementById('userStatsModal').classList.remove('active');
        }

        // Close on escape key
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeUserStats();
        });

        // Close on click outside
        window.onclick = function(event) {
            const modal = document.getElementById('userStatsModal');
            if (event.target == modal) {
                closeUserStats();
            }
        }
    </script>
</body>

</html>
