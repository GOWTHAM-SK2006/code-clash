<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — CodeClash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        :root {
            --bg-primary: #0F0F0F;
            --bg-secondary: #1A1A1A;
            --accent: #FF6B00;
            --accent-hover: #FF8C32;
        }

        body {
            background-color: var(--bg-primary);
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        .profile-card {
            background-color: var(--bg-secondary);
            border: 1px solid #2A2A2A;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .profile-card:hover {
            border-color: #3A3A3A;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .transaction-card {
            background: linear-gradient(to right, #1A1A1A, #141414);
            border-left: 4px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .transaction-card:hover {
            background: #222;
            transform: translateX(4px);
        }

        .transaction-positive {
            border-left-color: #00C853;
        }

        .transaction-negative {
            border-left-color: #FF3D00;
        }

        .amount-badge {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            letter-spacing: -0.5px;
        }

        /* Modal Styles */
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
        }

        .modal-content {
            background-color: var(--bg-primary);
            border: 1px solid #2A2A2A;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            border-bottom: 1px solid #242424;
            padding: 1.5rem;
        }

        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
        }

        .primary-btn {
            background-color: #242424;
            border: 1px solid #333;
            transition: all 0.2s ease;
        }

        .primary-btn:hover {
            border-color: var(--accent);
            background-color: #2A2A2A;
        }
    </style>
</head>

<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="page-content min-h-screen pt-24 pb-12">
        <div class="container mx-auto px-4 max-w-5xl space-y-8">

            <!-- Hero Section -->
            <section
                class="profile-hero p-6 rounded-2xl relative overflow-hidden flex flex-col md:flex-row items-center gap-6 shadow-xl">
                <div class="absolute inset-0 bg-gradient-to-br from-[#FF6B00]/5 to-transparent pointer-events-none">
                </div>
                <div class="relative z-10 w-24 h-24 rounded-full bg-gradient-to-br from-[#3A245E] to-[#1B1031] border-2 border-[#FF6B00]/30 flex items-center justify-center text-3xl font-black text-[#FFD8B8] shadow-md shadow-[#FF6B00]/10"
                    id="profileAvatar">
                    --
                </div>
                <div class="relative z-10 flex-1 text-center md:text-left space-y-1">
                    <h1 id="profileUsername" class="text-3xl font-black tracking-tight text-white">...</h1>
                    <p id="profileEmail" class="text-base font-medium text-gray-400 opacity-70">...</p>
                    <div class="flex flex-wrap justify-center md:justify-start gap-4 mt-3">
                        <div
                            class="px-3 py-1 rounded-full bg-white/5 border border-white/10 text-[10px] font-bold text-[#FF6B00] uppercase tracking-widest">
                            Pro Member
                        </div>
                        <div id="studentYearBadge"
                            class="hidden px-3 py-1 rounded-full bg-[#FF6B00]/10 border border-[#FF6B00]/20 text-[10px] font-bold text-[#FF6B00] uppercase tracking-widest">
                            <!-- Year will be injected here -->
                        </div>
                        <div id="profileSectionBadge"
                            class="hidden px-3 py-1 rounded-full bg-white/5 border border-white/10 text-[10px] font-bold text-[#FF6B00] uppercase tracking-widest">
                            <!-- Section will be injected here -->
                        </div>
                        <div id="profileDepartmentBadge"
                            class="hidden px-3 py-1 rounded-full bg-[#FF6B00]/10 border border-[#FF6B00]/20 text-[10px] font-bold text-[#FF6B00] uppercase tracking-widest">
                            <!-- Department will be injected here -->
                        </div>
                        <button id="openChangePasswordBtn"
                            class="px-3 py-1 rounded-full bg-[#FF6B00]/10 border border-[#FF6B00]/20 text-[10px] font-bold text-[#FF6B00] uppercase tracking-widest hover:bg-[#FF6B00]/20 transition-all flex items-center gap-1.5">
                            <span class="text-xs">🔑</span>
                            Change Password
                        </button>
                    </div>
                </div>
            </section>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <!-- Left Column: Coins & LeetCode -->
                <div class="lg:col-span-8 space-y-6">
                    <!-- Coin Summary Card -->
                    <div class="profile-card p-6 flex items-center justify-between group h-40">
                        <div class="space-y-1">
                            <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest opacity-60">Total
                                Balance</p>
                            <div class="flex items-baseline gap-2">
                                <h3 id="totalCoinsDisplay" class="text-5xl font-black text-white tracking-tighter">0
                                </h3>
                                <span
                                    class="text-[#FF6B00] font-bold text-base uppercase italic tracking-wider">Coins</span>
                            </div>
                        </div>
                        <div class="coin-icon-container relative">
                            <div
                                class="absolute inset-0 bg-[#FF6B00]/15 rounded-full blur-2xl group-hover:bg-[#FF6B00]/25 transition-all duration-500">
                            </div>
                            <span class="text-6xl relative z-10 animate-float">🪙</span>
                        </div>
                    </div>

                    <!-- Daily Check-in Card -->
                    <div id="checkInCard" class="profile-card p-6 flex flex-col md:flex-row items-center justify-between group gap-6 relative overflow-hidden">
                        <div class="absolute inset-0 bg-gradient-to-r from-[#FF6B00]/5 to-transparent pointer-events-none"></div>
                        <div class="relative z-10 space-y-1 text-center md:text-left">
                            <h3 class="text-xl font-black text-white tracking-tight">Daily Check-in</h3>
                            <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest opacity-60">Claim 30 Coins every 12 hours</p>
                        </div>
                        <div class="relative z-10 w-full md:w-auto text-center md:text-right">
                            <button id="claimCheckInBtn" class="w-full md:w-auto bg-[#FF6B00] hover:bg-[#FF8C32] text-black font-black py-3 px-8 rounded-xl transition-all active:scale-95 shadow-lg shadow-[#FF6B00]/10 text-xs uppercase tracking-widest disabled:opacity-50 disabled:cursor-not-allowed disabled:bg-white/5 disabled:text-gray-500 disabled:shadow-none flex items-center justify-center gap-2">
                                <span id="checkInIcon">📅</span>
                                <span id="checkInBtnText">Claim Now</span>
                            </button>
                            <div id="checkInTimer" class="hidden mt-2">
                                <p class="text-[10px] font-black text-[#FF6B00] uppercase tracking-widest">Next claim in: <span id="timerDisplay" class="font-mono">--:--:--</span></p>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Right Column: History -->
                <div class="lg:col-span-4 space-y-4">
                    <div class="flex items-center justify-between px-1">
                        <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-widest opacity-60">Recent
                            History</h3>
                        <button id="viewAllHistoryBtn"
                            class="text-[9px] font-black text-[#FF6B00] uppercase tracking-widest hover:underline hidden">See
                            All</button>
                    </div>
                    <div class="space-y-2" id="coinHistoryContainer">
                        <div class="px-6 py-12 text-center text-gray-700">
                            <div
                                class="w-5 h-5 border-2 border-white/5 border-t-[#FF6B00] rounded-full animate-spin mx-auto mb-2">
                            </div>
                            <span class="text-[9px] font-bold uppercase tracking-widest">Loading Records...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal remains mostly same but styled for glassmorphism -->
    <div id="historyModal" class="modal-overlay fixed inset-0 hidden flex items-center justify-center p-4">
        <div class="modal-content glass-card flex flex-col scale-95 transition-all duration-300"
            id="historyModalContent">
            <div class="modal-header flex items-center justify-between border-b border-white/5 pb-4">
                <h3 class="text-xl font-black text-white tracking-tight">Transaction History</h3>
                <button id="closeHistoryModal"
                    class="p-2 hover:bg-white/5 rounded-full transition-colors text-gray-500 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
            <div class="modal-body space-y-3 pt-6" id="modalHistoryContainer"></div>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div id="changePasswordModal" class="modal-overlay fixed inset-0 hidden flex items-center justify-center p-4">
        <div class="modal-content glass-card flex flex-col scale-95 transition-all duration-300 max-w-md"
            id="changePasswordModalContent">
            <div class="modal-header flex items-center justify-between border-b border-white/5 pb-4">
                <h3 class="text-xl font-black text-white tracking-tight">Change Password</h3>
                <button id="closeChangePasswordModal"
                    class="p-2 hover:bg-white/5 rounded-full transition-colors text-gray-500 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
            <div class="modal-body p-6 space-y-4">
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-1">Current
                        Password</label>
                    <input type="password" id="currentPasswordInput" placeholder="••••••••"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-[#FF6B00] transition-all">
                </div>
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-1">New
                        Password</label>
                    <input type="password" id="newPasswordInput" placeholder="••••••••"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-[#FF6B00] transition-all">
                </div>
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-1">Confirm New
                        Password</label>
                    <input type="password" id="confirmPasswordInput" placeholder="••••••••"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-[#FF6B00] transition-all">
                </div>

                <div id="passwordError"
                    class="hidden p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-red-500 text-[10px] font-bold uppercase tracking-wider text-center">
                    Passwords do not match
                </div>

                <button id="submitChangePasswordBtn"
                    class="w-full bg-[#FF6B00] hover:bg-[#FF8C32] text-black font-black py-3.5 rounded-xl transition-all active:scale-95 shadow-lg shadow-[#FF6B00]/10 text-[10px] uppercase tracking-widest mt-2 flex items-center justify-center gap-2">
                    <span id="submitSpinner"
                        class="hidden w-3 h-3 border-2 border-black/30 border-t-black rounded-full animate-spin"></span>
                    Update Password
                </button>
            </div>
        </div>
    </div>


    <style>
        :root {
            --bg-primary: #0A0A0C;
            --accent: #FF6B00;
        }

        body {
            background: radial-gradient(circle at top right, #121217, #0A0A0C);
            background-attachment: fixed;
            overflow-x: hidden;
            font-size: 14px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        .animate-float {
            animation: float 5s ease-in-out infinite;
        }

        .profile-hero {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 1.5rem;
            backdrop-filter: blur(16px);
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both 0.1s;
            transition: all 0.3s ease;
        }

        .profile-card:hover {
            border-color: rgba(255, 107, 0, 0.15);
            background: rgba(255, 255, 255, 0.03);
        }

        .stat-bubble {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .transaction-card {
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 1rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .transaction-card:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.08);
            transform: scale(1.01);
        }

        .glass-card {
            background: rgba(10, 10, 12, 0.95);
            backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 2rem;
        }

        .primary-btn {
            background: #141419;
            color: white;
            transition: all 0.3s ease;
        }

        .primary-btn:hover {
            border-color: var(--accent);
            background: #1A1A21;
        }

        /* Staggered history animations */
        #coinHistoryContainer .transaction-card:nth-child(1) {
            animation-delay: 0.2s;
        }

        #coinHistoryContainer .transaction-card:nth-child(2) {
            animation-delay: 0.25s;
        }

        #coinHistoryContainer .transaction-card:nth-child(3) {
            animation-delay: 0.3s;
        }
    </style>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
