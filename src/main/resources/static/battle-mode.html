<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Modes — CodeClash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="page-content">
        <div class="container">
            <div class="page-header battle-mode-header">
                <h1>⚔️ Choose Battle Mode</h1>
                <p>Select your match type to continue</p>
            </div>

            <div class="battle-mode-grid">
                <a href="battle.html" class="card card-glow battle-mode-card battle-mode-card-active">
                    <span class="battle-mode-badge">Available</span>
                    <h3>1 vs 1</h3>
                    <p>Classic head-to-head coding duel with random opponent matching.</p>
                    <span class="battle-mode-cta">Continue to 1v1 Arena →</span>
                </a>

                <button type="button" class="card card-glow battle-mode-card battle-mode-card-active" id="mode2v2Btn">
                    <span class="battle-mode-badge" style="background:var(--glow-secondary)">Team Collaboration</span>
                    <h3>2 vs 2</h3>
                    <p>Team up with a friend to outcode another duo in real-time!</p>
                    <span class="battle-mode-cta">Invite a Friend →</span>
                </button>
            </div>
        </div>

        <!-- Friend Invitation Modal -->
        <div id="inviteModal" class="modal-overlay hidden">
            <div class="card modal-card">
                <div class="modal-header">
                    <h2>Invite a Friend</h2>
                    <button class="modal-close" id="closeInviteModal">&times;</button>
                </div>
                <div class="friend-list-container" id="friendList">
                    <!-- Friends will be loaded here -->
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/battle-mode.js"></script>
</body>

</html>
