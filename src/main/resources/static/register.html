<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — CodeClash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="auth-container">
        <div class="auth-card">
            <h1>Create account</h1>
            <p class="subtitle">Join CodeClash and start coding</p>

            <div id="alert" class="alert alert-error"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="displayName">Display Name</label>
                    <input type="text" id="displayName" class="form-input" placeholder="How should we call you?"
                        required>
                </div>
                <div class="form-group">
                    <label for="username">College ID</label>
                    <input type="text" id="username" class="form-input" placeholder="Enter your College ID" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="leetcodeUsername">LeetCode Username</label>
                    <input type="text" id="leetcodeUsername" class="form-input" placeholder="Your LeetCode username" required>
                </div>
                <div class="form-group">
                    <label for="section">Section</label>
                    <select id="section" class="form-input" required>
                        <option value="" disabled selected>Select your section</option>
                        <option value="A">A</option><option value="B">B</option><option value="C">C</option>
                        <option value="D">D</option><option value="E">E</option><option value="F">F</option>
                        <option value="G">G</option><option value="H">H</option><option value="I">I</option>
                        <option value="J">J</option><option value="K">K</option><option value="L">L</option>
                        <option value="M">M</option><option value="N">N</option><option value="O">O</option>
                        <option value="P">P</option><option value="Q">Q</option><option value="R">R</option>
                        <option value="S">S</option><option value="T">T</option><option value="U">U</option>
                        <option value="V">V</option><option value="W">W</option><option value="X">X</option>
                        <option value="Y">Y</option><option value="Z">Z</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="Min 6 characters" required
                            minlength="6">
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
                            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Create Account</button>
            </form>

            <p class="auth-footer">Already have an account? <a href="login.html">Log in</a></p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        renderNav('register');
        if (api.isLoggedIn()) {
            window.location.href = 'dashboard.html';
        }

        // Toggle Password Visibility
        const passwordInput = document.getElementById('password');
        const passwordToggle = document.getElementById('passwordToggle');
        const eyeIcon = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
        `;
        const eyeOffIcon = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
        `;

        passwordToggle.addEventListener('click', () => {
            const isPassword = passwordInput.getAttribute('type') === 'password';
            passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
            passwordToggle.innerHTML = isPassword ? eyeOffIcon : eyeIcon;
        });

        // Check if registrations are allowed
        (async () => {
            try {
                const res = await fetch('/api/auth/registration-status');
                const status = await res.json();
                if (!status.allowed) {
                    // Freeze the entire form
                    const form = document.getElementById('registerForm');
                    const inputs = form.querySelectorAll('input, button');
                    inputs.forEach(el => {
                        el.disabled = true;
                        el.style.opacity = '0.4';
                        el.style.cursor = 'not-allowed';
                    });

                    // Show closed banner
                    const banner = document.createElement('div');
                    banner.style.cssText = 'background: rgba(255,60,60,0.15); border: 1px solid #ff4444; color: #ff6b6b; padding: 1rem; border-radius: 10px; text-align: center; font-weight: 700; margin-bottom: 1rem; font-size: 0.95rem;';
                    banner.innerHTML = '🚫 Registrations are currently closed by the administrator.';
                    form.parentNode.insertBefore(banner, form);
                }
            } catch (_) { /* allow form if check fails */ }
        })();

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const displayName = document.getElementById('displayName').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const leetcodeUsername = document.getElementById('leetcodeUsername').value;
            const section = document.getElementById('section').value;

            try {
                const data = await api.register(username, email, password, displayName, leetcodeUsername, section);
                api.setAuth(data);
                window.location.href = 'dashboard.html';
            } catch (err) {
                showAlert('alert', err.message);
            }
        });
    </script>
</body>

</html>
