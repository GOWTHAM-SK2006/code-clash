<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Clash — CodeClash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .auth-background {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            background: #05060A;
        }

        .auth-card-premium {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: card-pop-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .form-input-premium {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            color: white;
            width: 100%;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input-premium:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(255, 107, 0, 0.15);
            transform: translateY(-1px);
        }

        .auth-header h1 {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            background: linear-gradient(to bottom, #fff, #A0A0A0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-header p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="auth-background">
        <div class="energy-bloom" style="width: 600px; height: 600px; top: -10%; left: -10%; background: radial-gradient(circle, rgba(255, 107, 0, 0.15) 0%, transparent 70%);"></div>
        <div class="energy-bloom" style="width: 500px; height: 500px; bottom: -5%; right: -5%; background: radial-gradient(circle, rgba(102, 157, 255, 0.1) 0%, transparent 70%); animation-delay: -5s;"></div>
    </div>

    <nav class="navbar" id="navbar"></nav>

    <main class="flex items-center justify-center min-h-screen pt-20 px-4">
        <div class="auth-card-premium">
            <div class="auth-header text-center">
                <h1>Create Account</h1>
                <p>Join the elite league of coders</p>
            </div>

            <div id="alert" class="alert alert-error mb-6" style="display: none;"></div>

            <form id="registerForm" class="space-y-4">
                <div class="form-group">
                    <label class="block text-sm font-semibold text-gray-400 mb-2">Display Name</label>
                    <input type="text" id="displayName" class="form-input-premium" placeholder="How should we call you?" required>
                </div>
                <div class="form-group">
                    <label class="block text-sm font-semibold text-gray-400 mb-2">Username</label>
                    <input type="text" id="username" class="form-input-premium" placeholder="Enter your Username" required>
                </div>
                <div class="form-group">
                    <label class="block text-sm font-semibold text-gray-400 mb-2">Email Address</label>
                    <input type="email" id="email" class="form-input-premium" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label class="block text-sm font-semibold text-gray-400 mb-2">Secure Password</label>
                    <div class="relative">
                        <input type="password" id="password" class="form-input-premium" placeholder="Min 6 characters" required minlength="6">
                        <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white transition-colors" id="passwordToggle">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg w-full mt-4 btn-shimmer">
                    Launch Account
                </button>
            </form>

            <p class="text-center mt-8 text-gray-400 text-sm font-medium">
                Already part of the clash? <a href="login.html" class="text-orange-500 hover:text-orange-400 transition-colors">Log in</a>
            </p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        renderNav('register');
        if (api.isLoggedIn()) {
            window.location.href = 'dashboard.html';
        }

        const passwordInput = document.getElementById('password');
        const passwordToggle = document.getElementById('passwordToggle');
        
        const eyeIconHtml = `
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
        `;
        const eyeOffIconHtml = `
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
            </svg>
        `;

        passwordToggle.addEventListener('click', () => {
            const isPassword = passwordInput.getAttribute('type') === 'password';
            passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
            passwordToggle.innerHTML = isPassword ? eyeOffIconHtml : eyeIconHtml;
        });

        (async () => {
            try {
                const res = await fetch('/api/auth/registration-status');
                const status = await res.json();
                if (!status.allowed) {
                    const form = document.getElementById('registerForm');
                    const inputs = form.querySelectorAll('input, button');
                    inputs.forEach(el => {
                        el.disabled = true;
                        el.style.opacity = '0.4';
                        el.style.cursor = 'not-allowed';
                    });

                    const banner = document.createElement('div');
                    banner.style.cssText = 'background: rgba(255,60,60,0.1); border: 1px solid rgba(255,60,60,0.2); color: #ff6b6b; padding: 1rem; border-radius: 12px; text-align: center; font-weight: 600; margin-bottom: 2rem; font-size: 0.9rem;';
                    banner.innerHTML = '🚫 Registrations are currently closed by administration.';
                    form.parentNode.insertBefore(banner, form);
                }
            } catch (_) { }
        })();

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            
            const displayName = document.getElementById('displayName').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                btn.disabled = true;
                btn.innerHTML = '<span class="animate-spin mr-2">⏳</span> Launching...';
                const data = await api.register(username, email, password, displayName);
                api.setAuth(data);
                window.location.href = 'dashboard.html';
            } catch (err) {
                btn.disabled = false;
                btn.innerHTML = originalText;
                showAlert('alert', err.message);
            }
        });
    </script>
</body>

</html>
html>
