<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problems — CodeClash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .solved-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.8rem;
            background: rgba(0, 200, 83, 0.1);
            color: #00C853;
            border: 1px solid rgba(0, 200, 83, 0.2);
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            box-shadow: 0 0 15px rgba(0, 200, 83, 0.1);
        }

        .solved-badge i {
            width: 14px;
            height: 14px;
        }

        .solved-row {
            background: rgba(0, 200, 83, 0.02) !important;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            position: relative;
        }

        /* Tooltip behavior */
        .tooltip {
            position: relative;
            cursor: pointer;
        }

        .tooltip::after {
            content: attr(data-tip);
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            padding: 4px 8px;
            background: #1A1A1A;
            color: white;
            font-size: 10px;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
        }

        .tooltip:hover::after {
            opacity: 1;
            visibility: visible;
        }

        /* Responsive adjustments */
        @media (max-width: 640px) {
            .solved-badge span {
                display: none;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="page-content">
        <!-- Decorative Energy Blooms -->
        <div class="energy-bloom" style="width: 500px; height: 500px; top: -100px; left: -150px; background: rgba(255, 107, 0, 0.12);"></div>
        <div class="energy-bloom" style="width: 400px; height: 400px; bottom: 10%; right: -100px; background: rgba(102, 126, 234, 0.1);"></div>

        <div class="container">
            <div class="page-header">
                <h1>LeetCode Problem Roadmap</h1>
                <p>Follow your ordered sheet and click Solve to open the exact LeetCode problem</p>
            </div>

            <div class="mb-6 max-w-xl mx-auto">
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-white/40 group-focus-within:text-[#FF6B00] transition-colors">
                        <i data-lucide="search" class="w-4 h-4"></i>
                    </div>
                    <input type="text" id="problemSearch" 
                        placeholder="Search by LC number or problem name..." 
                        class="w-full bg-[#1e1e2e]/50 border border-white/10 rounded-xl pl-11 pr-4 py-3 text-sm text-white focus:outline-none focus:border-[#FF6B00] focus:ring-1 focus:ring-[#FF6B00]/20 transition-all placeholder:text-white/20">
                </div>
            </div>

            <div id="problemsList" class="card">
                <div class="spinner"></div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/problems.js"></script>
</body>

</html>
