<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CodeClash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="auth-container">
        <div class="auth-card">
            <h1>Welcome back</h1>
            <p class="subtitle">Log in to your CodeClash account</p>

            <div id="alert" class="alert alert-error"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">User Name</label>
                    <input type="text" id="username" class="form-input" placeholder="Enter your User Name" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
                            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Log In</button>
            </form>

            <p class="auth-footer">Don't have an account? <a href="register.html">Sign up</a></p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        renderNav('login');
        if (api.isLoggedIn()) {
            window.location.href = 'dashboard.html';
        }

        // Toggle Password Visibility
        const passwordInput = document.getElementById('password');
        const passwordToggle = document.getElementById('passwordToggle');
        const eyeIcon = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
        `;
        const eyeOffIcon = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
        `;

        passwordToggle.addEventListener('click', () => {
            const isPassword = passwordInput.getAttribute('type') === 'password';
            passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
            passwordToggle.innerHTML = isPassword ? eyeOffIcon : eyeIcon;
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Check for Admin Login redirection logic
            if (username === 'admin') {
                try {
                    const res = await fetch('/api/admin/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });

                    const payload = await res.json().catch(() => ({}));
                    if (res.ok) {
                        if (payload?.token) {
                            localStorage.setItem('cc_admin_session', payload.token);
                        }
                        window.location.href = payload?.redirect || 'admin-dashboard.html';
                        return;
                    }
                    // If username is admin but admin login fails, it might be a regular user named admin (unlikely but possible)
                    // or just a wrong password. We'll fall through to regular login just in case.
                } catch (_err) {
                    console.error('Admin login attempt failed', _err);
                }
            }

            try {
                const data = await api.login(username, password);
                api.setAuth(data);
                window.location.href = 'dashboard.html';
            } catch (err) {
                showAlert('alert', err.message);
            }
        });
    </script>
</body>

</html>
